version: "3.9"

services:
  db:
    image: postgres:latest
    container_name: neonexor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - neonexor_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: neonexor_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DB_HOST: db
      port: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - neonexor_network

  frontend:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: neonexor_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NEST_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - neonexor_network

  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: pgadmin4_ui
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@admin.com
  #     PGADMIN_DEFAULT_PASSWORD: adminpassword
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - db
  adminer:
    image: adminer:latest
    container_name: neonexor_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - neonexor_network
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  neonexor_network:
    driver: bridge
